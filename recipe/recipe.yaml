context:
  version: "2.1.2"

package:
  name: evalidate
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/e/evalidate/evalidate-${{ version }}.tar.gz
    sha256: c90d44251195345cc967442da7344dc9f5e85918d8f6603f993dbbe36cd38045

build:
  number: 0
  script: ${{ PYTHON }} -m pip install .
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.27.0
    - wheel
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - evalidate
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Validation and secure evaluation of untrusted python expressions
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/yaroslaff/evalidate
  repository: https://github.com/yaroslaff/evalidate

extra:
  recipe-maintainers:
    - jaimergp
